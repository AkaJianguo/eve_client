services:
  eve-server:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always
    env_file:
      - ./eve-server/.env.production
    environment:
      - ENV=production
    # 生产环境通常不映射端口到宿主机，而是通过 Nginx 反代

  eve-client:
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm preview --host 0.0.0.0 --port 4173"
    restart: always
    environment:
      - VITE_PROXY_TARGET=http://eve-server:8000
    # 生产环境通常不映射端口到宿主机，而是通过 Nginx 或网关统一暴露