services:
  eve-server:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-config logging.json
    volumes:
      - ./eve-server:/app          # 挂载后端代码
    ports:
      - "8000:8000"                # 暴露 API 端口
    env_file:
      - ${EVE_SERVER_ENV_FILE:-./eve-server/.env.docker}
    environment:
      - ENV=development
      - FRONTEND_URL=http://127.0.0.1:5173

  eve-client:
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0 --port 5173"
    volumes:
      - ./eve-client-web:/app      # 挂载前端代码
      - /app/node_modules          # 防止本地 node_modules 覆盖容器内的
    ports:
      - "5173:5173"                # 暴露 Vite 端口
    environment:
      - CI=true
      - VITE_PROXY_TARGET=http://eve-server:8000